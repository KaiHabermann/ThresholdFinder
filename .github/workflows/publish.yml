name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify run is against a tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/* ]]; then
            echo "This workflow must be triggered from a tag, got: ${{ github.ref }}"
            exit 1
          fi

  build:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
